services:
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../infra/docker/frontend/Dockerfile
    image: surfacelab/frontend:local
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_API_KEY:-dev-orchestrator-api-key}
      ORCHESTRATOR_REQUEST_TIMEOUT_MS: ${ORCHESTRATOR_REQUEST_TIMEOUT_MS:-10000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  orchestrator:
    build:
      context: ../../apps/orchestrator
      dockerfile: ../../infra/docker/orchestrator/Dockerfile
    image: surfacelab/orchestrator:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scanner:
        condition: service_started
      laravel-stack:
        condition: service_started
      php-stack:
        condition: service_started
      ecommerce-stack:
        condition: service_started
    environment:
      PORT: 8000
      UVICORN_WORKERS: ${ORCHESTRATOR_WORKERS:-2}
      DATABASE_URL: postgresql://surfacelab_orchestrator:${POSTGRES_ORCHESTRATOR_PASSWORD:-change-me-orchestrator}@postgres:5432/${POSTGRES_DB:-surfacelab}?sslmode=disable
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_API_KEY:-dev-orchestrator-api-key}
      ORCHESTRATOR_REQUIRE_API_KEY: ${ORCHESTRATOR_REQUIRE_API_KEY:-true}
      ORCHESTRATOR_RATE_LIMIT_ENABLED: ${ORCHESTRATOR_RATE_LIMIT_ENABLED:-true}
      ORCHESTRATOR_RATE_LIMIT_RPM: ${ORCHESTRATOR_RATE_LIMIT_RPM:-60}
      ORCHESTRATOR_RATE_LIMIT_BURST: ${ORCHESTRATOR_RATE_LIMIT_BURST:-20}
      ORCHESTRATOR_ALLOWED_ORIGINS: ${ORCHESTRATOR_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ORCHESTRATOR_TRUSTED_HOSTS: ${ORCHESTRATOR_TRUSTED_HOSTS:-localhost,127.0.0.1,[::1],frontend,orchestrator}
      ORCHESTRATOR_SECURITY_HEADERS_ENABLED: ${ORCHESTRATOR_SECURITY_HEADERS_ENABLED:-true}
      ORCHESTRATOR_BODY_LIMIT_BYTES: ${ORCHESTRATOR_BODY_LIMIT_BYTES:-1048576}
      SCANNER_GRPC_ADDRESS: scanner:50051
      SCANNER_SERVICE_TOKEN: ${SCANNER_SERVICE_TOKEN:-dev-scanner-token}
      SCANNER_GRPC_AUTH_MODE: ${SCANNER_GRPC_AUTH_MODE:-bearer}
      SCANNER_GRPC_TLS_ENABLED: ${SCANNER_GRPC_TLS_ENABLED:-false}
      SCANNER_GRPC_TLS_CA_FILE: ${SCANNER_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      SCANNER_GRPC_TLS_SERVER_NAME: ${SCANNER_GRPC_TLS_SERVER_NAME:-}
      WP_STACK_ENABLED: ${WP_STACK_ENABLED:-false}
      WP_STACK_GRPC_ADDRESS: ${WP_STACK_GRPC_ADDRESS:-wp-stack:50062}
      WP_STACK_SERVICE_TOKEN: ${WP_STACK_SERVICE_TOKEN:-dev-wp-stack-token}
      WP_STACK_GRPC_AUTH_MODE: ${WP_STACK_GRPC_AUTH_MODE:-bearer}
      WP_STACK_GRPC_TLS_ENABLED: ${WP_STACK_GRPC_TLS_ENABLED:-false}
      WP_STACK_GRPC_TLS_CA_FILE: ${WP_STACK_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      WP_STACK_GRPC_TLS_SERVER_NAME: ${WP_STACK_GRPC_TLS_SERVER_NAME:-}
      NEXTJS_STACK_ENABLED: ${NEXTJS_STACK_ENABLED:-false}
      NEXTJS_STACK_GRPC_ADDRESS: ${NEXTJS_STACK_GRPC_ADDRESS:-nextjs-stack:50061}
      NEXTJS_STACK_SERVICE_TOKEN: ${NEXTJS_STACK_SERVICE_TOKEN:-dev-nextjs-stack-token}
      NEXTJS_STACK_GRPC_AUTH_MODE: ${NEXTJS_STACK_GRPC_AUTH_MODE:-bearer}
      NEXTJS_STACK_GRPC_TLS_ENABLED: ${NEXTJS_STACK_GRPC_TLS_ENABLED:-false}
      NEXTJS_STACK_GRPC_TLS_CA_FILE: ${NEXTJS_STACK_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      NEXTJS_STACK_GRPC_TLS_SERVER_NAME: ${NEXTJS_STACK_GRPC_TLS_SERVER_NAME:-}
      LARAVEL_STACK_ENABLED: ${LARAVEL_STACK_ENABLED:-false}
      LARAVEL_STACK_GRPC_ADDRESS: ${LARAVEL_STACK_GRPC_ADDRESS:-${LARAVEL_STACK_GRPC_ADDR:-laravel-stack:50063}}
      LARAVEL_STACK_GRPC_ADDR: ${LARAVEL_STACK_GRPC_ADDR:-${LARAVEL_STACK_GRPC_ADDRESS:-laravel-stack:50063}}
      LARAVEL_STACK_SERVICE_TOKEN: ${LARAVEL_STACK_SERVICE_TOKEN:-dev-laravel-stack-token}
      LARAVEL_STACK_GRPC_AUTH_MODE: ${LARAVEL_STACK_GRPC_AUTH_MODE:-bearer}
      LARAVEL_STACK_GRPC_TLS_ENABLED: ${LARAVEL_STACK_GRPC_TLS_ENABLED:-false}
      LARAVEL_STACK_GRPC_TLS_CA_FILE: ${LARAVEL_STACK_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      LARAVEL_STACK_GRPC_TLS_SERVER_NAME: ${LARAVEL_STACK_GRPC_TLS_SERVER_NAME:-}
      PHP_STACK_ENABLED: ${PHP_STACK_ENABLED:-false}
      PHP_STACK_GRPC_ADDRESS: ${PHP_STACK_GRPC_ADDRESS:-${PHP_STACK_GRPC_ADDR:-php-stack:50064}}
      PHP_STACK_GRPC_ADDR: ${PHP_STACK_GRPC_ADDR:-${PHP_STACK_GRPC_ADDRESS:-php-stack:50064}}
      PHP_STACK_SERVICE_TOKEN: ${PHP_STACK_SERVICE_TOKEN:-dev-php-stack-token}
      PHP_STACK_GRPC_AUTH_MODE: ${PHP_STACK_GRPC_AUTH_MODE:-bearer}
      PHP_STACK_GRPC_TLS_ENABLED: ${PHP_STACK_GRPC_TLS_ENABLED:-false}
      PHP_STACK_GRPC_TLS_CA_FILE: ${PHP_STACK_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      PHP_STACK_GRPC_TLS_SERVER_NAME: ${PHP_STACK_GRPC_TLS_SERVER_NAME:-}
      SHOPIFY_STACK_ENABLED: ${SHOPIFY_STACK_ENABLED:-false}
      SHOPIFY_STACK_GRPC_ADDRESS: ${SHOPIFY_STACK_GRPC_ADDRESS:-${SHOPIFY_STACK_GRPC_ADDR:-${ECOMMERCE_STACK_GRPC_ADDRESS:-${ECOMMERCE_STACK_GRPC_ADDR:-ecommerce-stack:50065}}}}
      SHOPIFY_STACK_GRPC_ADDR: ${SHOPIFY_STACK_GRPC_ADDR:-${SHOPIFY_STACK_GRPC_ADDRESS:-${ECOMMERCE_STACK_GRPC_ADDRESS:-${ECOMMERCE_STACK_GRPC_ADDR:-ecommerce-stack:50065}}}}
      ECOMMERCE_STACK_GRPC_ADDRESS: ${ECOMMERCE_STACK_GRPC_ADDRESS:-${SHOPIFY_STACK_GRPC_ADDRESS:-${SHOPIFY_STACK_GRPC_ADDR:-${ECOMMERCE_STACK_GRPC_ADDR:-ecommerce-stack:50065}}}}
      ECOMMERCE_STACK_GRPC_ADDR: ${ECOMMERCE_STACK_GRPC_ADDR:-${ECOMMERCE_STACK_GRPC_ADDRESS:-${SHOPIFY_STACK_GRPC_ADDRESS:-${SHOPIFY_STACK_GRPC_ADDR:-ecommerce-stack:50065}}}}
      SHOPIFY_STACK_SERVICE_TOKEN: ${SHOPIFY_STACK_SERVICE_TOKEN:-dev-shopify-stack-token}
      SHOPIFY_STACK_GRPC_AUTH_MODE: ${SHOPIFY_STACK_GRPC_AUTH_MODE:-bearer}
      SHOPIFY_STACK_GRPC_TLS_ENABLED: ${SHOPIFY_STACK_GRPC_TLS_ENABLED:-false}
      SHOPIFY_STACK_GRPC_TLS_CA_FILE: ${SHOPIFY_STACK_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      SHOPIFY_STACK_GRPC_TLS_SERVER_NAME: ${SHOPIFY_STACK_GRPC_TLS_SERVER_NAME:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      NVD_ENABLED: ${NVD_ENABLED:-false}
      NVD_MIN_INTERVAL_SECONDS: ${NVD_MIN_INTERVAL_SECONDS:-6}
      NVD_TIMEOUT_SECONDS: ${NVD_TIMEOUT_SECONDS:-10}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      NVD_CACHE_TTL_SECONDS: ${NVD_CACHE_TTL_SECONDS:-86400}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-30}
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\" || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  scanner:
    build:
      context: ../../services/scanner
      dockerfile: ../../infra/docker/scanner/Dockerfile
    image: surfacelab/scanner:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${SCANNER_APP_ENV:-development}
      GRPC_PORT: 50051
      DATABASE_URL: postgresql://surfacelab_scanner:${POSTGRES_SCANNER_PASSWORD:-change-me-scanner}@postgres:5432/${POSTGRES_DB:-surfacelab}?sslmode=disable
      SCANNER_SERVICE_TOKEN: ${SCANNER_SERVICE_TOKEN:-dev-scanner-token}
      SCANNER_GRPC_TLS_ENABLED: ${SCANNER_GRPC_TLS_ENABLED:-false}
      SCANNER_GRPC_TLS_CERT_FILE: ${SCANNER_GRPC_TLS_CERT_FILE:-/certificates/scanner.crt}
      SCANNER_GRPC_TLS_KEY_FILE: ${SCANNER_GRPC_TLS_KEY_FILE:-/certificates/scanner.key}
      SCANNER_GRPC_TLS_CA_FILE: ${SCANNER_GRPC_TLS_CA_FILE:-/certificates/scanner-ca.crt}
      SCANNER_RATE_LIMIT_RPS: ${SCANNER_RATE_LIMIT_RPS:-5}
      SCANNER_RATE_LIMIT_BURST: ${SCANNER_RATE_LIMIT_BURST:-10}
      SCANNER_MAX_CONCURRENT_REQUESTS: ${SCANNER_MAX_CONCURRENT_REQUESTS:-4}
      SCANNER_REQUEST_TIMEOUT_SECONDS: ${SCANNER_REQUEST_TIMEOUT_SECONDS:-30}
    expose:
      - "50051"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 50051 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  laravel-stack:
    build:
      context: ../../services/laravel-stack
      dockerfile: ../../infra/docker/laravel-stack/Dockerfile
    image: surfacelab/laravel-stack:local
    environment:
      APP_ENV: ${LARAVEL_STACK_APP_ENV:-development}
      GRPC_PORT: 50063
      SERVICE_TOKEN: ${LARAVEL_STACK_SERVICE_TOKEN:-dev-laravel-stack-token}
      RATE_LIMIT_RPS: ${LARAVEL_STACK_RATE_LIMIT_RPS:-5}
      RATE_LIMIT_BURST: ${LARAVEL_STACK_RATE_LIMIT_BURST:-10}
      MAX_CONCURRENT_REQUESTS: ${LARAVEL_STACK_MAX_CONCURRENT_REQUESTS:-4}
      REQUEST_TIMEOUT_SECONDS: ${LARAVEL_STACK_REQUEST_TIMEOUT_SECONDS:-30}
      GRPC_TLS_ENABLED: ${LARAVEL_STACK_GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CERT_FILE: ${LARAVEL_STACK_GRPC_TLS_CERT_FILE:-/certificates/scanner.crt}
      GRPC_TLS_KEY_FILE: ${LARAVEL_STACK_GRPC_TLS_KEY_FILE:-/certificates/scanner.key}
    expose:
      - "50063"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 50063 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  php-stack:
    build:
      context: ../../services/php-stack
      dockerfile: ../../infra/docker/php-stack/Dockerfile
    image: surfacelab/php-stack:local
    environment:
      APP_ENV: ${PHP_STACK_APP_ENV:-development}
      GRPC_PORT: 50064
      SERVICE_TOKEN: ${PHP_STACK_SERVICE_TOKEN:-dev-php-stack-token}
      RATE_LIMIT_RPS: ${PHP_STACK_RATE_LIMIT_RPS:-5}
      RATE_LIMIT_BURST: ${PHP_STACK_RATE_LIMIT_BURST:-10}
      MAX_CONCURRENT_REQUESTS: ${PHP_STACK_MAX_CONCURRENT_REQUESTS:-4}
      REQUEST_TIMEOUT_SECONDS: ${PHP_STACK_REQUEST_TIMEOUT_SECONDS:-30}
      GRPC_TLS_ENABLED: ${PHP_STACK_GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CERT_FILE: ${PHP_STACK_GRPC_TLS_CERT_FILE:-/certificates/scanner.crt}
      GRPC_TLS_KEY_FILE: ${PHP_STACK_GRPC_TLS_KEY_FILE:-/certificates/scanner.key}
    expose:
      - "50064"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 50064 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ecommerce-stack:
    build:
      context: ../../services/ecommerce-stack
      dockerfile: ../../infra/docker/ecommerce-stack/Dockerfile
    image: surfacelab/ecommerce-stack:local
    environment:
      APP_ENV: ${SHOPIFY_STACK_APP_ENV:-development}
      GRPC_PORT: 50065
      SERVICE_TOKEN: ${SHOPIFY_STACK_SERVICE_TOKEN:-dev-shopify-stack-token}
      RATE_LIMIT_RPS: ${SHOPIFY_STACK_RATE_LIMIT_RPS:-5}
      RATE_LIMIT_BURST: ${SHOPIFY_STACK_RATE_LIMIT_BURST:-10}
      MAX_CONCURRENT_REQUESTS: ${SHOPIFY_STACK_MAX_CONCURRENT_REQUESTS:-4}
      REQUEST_TIMEOUT_SECONDS: ${SHOPIFY_STACK_REQUEST_TIMEOUT_SECONDS:-30}
      GRPC_TLS_ENABLED: ${SHOPIFY_STACK_GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CERT_FILE: ${SHOPIFY_STACK_GRPC_TLS_CERT_FILE:-/certificates/scanner.crt}
      GRPC_TLS_KEY_FILE: ${SHOPIFY_STACK_GRPC_TLS_KEY_FILE:-/certificates/scanner.key}
    expose:
      - "50065"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 50065 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surfacelab}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_MIGRATE_PASSWORD: ${POSTGRES_MIGRATE_PASSWORD:-change-me-migrate}
      POSTGRES_SCANNER_PASSWORD: ${POSTGRES_SCANNER_PASSWORD:-change-me-scanner}
      POSTGRES_ORCHESTRATOR_PASSWORD: ${POSTGRES_ORCHESTRATOR_PASSWORD:-change-me-orchestrator}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ../../services/scanner/db/roles/001_runtime_roles.sql:/surfacelab-init/roles.sql:ro
      - ../../services/scanner/db/migrations/000001_init.up.sql:/surfacelab-init/000001_init.up.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${POSTGRES_DB:-surfacelab}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
