services:
  nextjs-stack:
    build:
      context: ../..
      dockerfile: infra/docker/nextjs-stack/Dockerfile
    image: surfacelab/nextjs-stack:local
    environment:
      APP_ENV: ${NEXTJS_STACK_APP_ENV:-development}
      GRPC_PORT: 50061
      SERVICE_TOKEN: ${NEXTJS_STACK_SERVICE_TOKEN:-dev-nextjs-stack-token}
      RATE_LIMIT_RPS: ${NEXTJS_STACK_RATE_LIMIT_RPS:-5}
      RATE_LIMIT_BURST: ${NEXTJS_STACK_RATE_LIMIT_BURST:-10}
      MAX_CONCURRENT_REQUESTS: ${NEXTJS_STACK_MAX_CONCURRENT_REQUESTS:-4}
      REQUEST_TIMEOUT_SECONDS: ${NEXTJS_STACK_REQUEST_TIMEOUT_SECONDS:-30}
      GRPC_TLS_ENABLED: ${NEXTJS_STACK_GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CERT_FILE: ${NEXTJS_STACK_GRPC_TLS_CERT_FILE:-/certificates/scanner.crt}
      GRPC_TLS_KEY_FILE: ${NEXTJS_STACK_GRPC_TLS_KEY_FILE:-/certificates/scanner.key}
    ports:
      - "${NEXTJS_STACK_HOST_PORT:-50061}:50061"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 50061 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

